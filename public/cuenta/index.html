<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Acceso — Red Voluntarias</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        color: #111;
        padding: 1rem;
        text-align: center;
      }
      p {
        max-width: 28rem;
        line-height: 1.5;
        font-size: 0.95rem;
        color: #444;
      }
      a {
        color: #2563eb;
      }
    </style>
  </head>
  <body>
    <div>
      <p>
        Debería abrirse una ventana para completar el registro o la contraseña. Si no pasa, esperá unos segundos o recargá la página. Después podés ir al
        <a href="/admin/">panel de administración</a>.
      </p>
    </div>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      (function () {
        var ni = window.netlifyIdentity;
        if (!ni) return;
        ni.on("init", function (user) {
          if (!user) {
            ni.on("login", function () {
              window.location.replace("/admin/");
            });
          }
        });
        ni.init();
        function openIfToken() {
          var h = window.location.hash;
          if (h && /invite_token|recovery_token|confirmation_token|email_change_token/.test(h)) {
            ni.open();
          }
        }
        setTimeout(openIfToken, 50);
        setTimeout(openIfToken, 400);
      })();
    </script>
  </body>
</html>
